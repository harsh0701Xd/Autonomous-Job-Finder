# docker/nginx.conf
#
# Reverse proxy for Autonomous Job Finder.
# Routes:
#   /          -> Streamlit  (port 8501) -- WebSocket upgrade required
#   /api/      -> FastAPI    (port 8000)
#   /mlflow/   -> MLflow     (port 5000)
#
# SSL: this file serves HTTP only (port 80).
# After the first deploy, run Certbot to obtain a Let's Encrypt certificate
# and let it rewrite this file with the HTTPS server block automatically:
#   sudo certbot --nginx -d yourdomain.com

events {
    worker_connections 1024;
}

http {
    # -- Upstream definitions --------------------------------------------------

    upstream streamlit {
        server streamlit:8501;
    }

    upstream api {
        server api:8000;
    }

    upstream mlflow {
        server mlflow:5000;
    }

    # -- Timeouts for long-running pipeline requests ---------------------------
    # The job search + ranking pipeline takes up to ~150s.
    # proxy_read_timeout must exceed the uvicorn timeout-keep-alive (120s).

    proxy_connect_timeout   10s;
    proxy_send_timeout     180s;
    proxy_read_timeout     180s;

    # -- Main server block -----------------------------------------------------

    server {
        listen 80;
        server_name _;          # replace with your domain once DNS is set up

        # -- Streamlit (/) -----------------------------------------------------
        # Streamlit requires WebSocket proxying for its reactive UI.
        # Without the Upgrade/Connection headers the page loads but interactions
        # silently stop working.

        location / {
            proxy_pass         http://streamlit;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep WebSocket connections alive
            proxy_read_timeout 86400s;
        }

        # -- FastAPI (/api/) ---------------------------------------------------

        location /api/ {
            proxy_pass         http://api/api/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Allow large resume uploads (10 MB limit matches frontend validation)
            client_max_body_size 12m;
        }

        # -- MLflow Ajax API (/ajax-api/) -------------------------------------
        # MLflow 3.x JavaScript makes API calls to /ajax-api/2.0/mlflow/...
        # WITHOUT the /mlflow/ prefix. Without this block, those requests fall
        # through to the root location and hit Streamlit, causing INTERNAL_ERROR
        # in the Runs list view.

        location /ajax-api/ {
            proxy_pass         http://mlflow/ajax-api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              mlflow;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -- MLflow (/mlflow/) ------------------------------------------------
        # Basic auth can be added here once the domain + SSL are in place.

        location /mlflow/ {
            proxy_pass         http://mlflow/;
            proxy_http_version 1.1;

            # Override Host to match MLflow's allowed-hosts list.
            # MLflow rejects requests whose Host header isn't in --allowed-hosts;
            # passing the upstream name directly satisfies that check regardless
            # of whether the browser is using an IP, domain, or localhost.
            proxy_set_header   Host              mlflow;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
