# core/config/llm_config.yaml
#
# All LLM parameters and scoring constants for the Autonomous Job Finder.
# Edit here -- no code changes needed for tuning.

# -- Resume Parser (Agent 2) ---------------------------------------------------
resume_parser:
  model:       claude-sonnet-4-6
  max_tokens:  4096
  temperature: 0.1
  timeout_secs: 60
  min_text_length: 200          # chars -- below this the resume is treated as a parse failure

# -- Profile Recommender (Agent 2b) -------------------------------------------
profile_recommender:
  model:       claude-haiku-4-5-20251001
  max_tokens:  1024
  temperature: 0.4
  timeout_secs: 30

# -- Job Search (Agent 3) ------------------------------------------------------
job_search:
  num_pages: 2                   # fallback pages for any source not listed under sources:
  min_jd_chars: 200              # chars gate -- JDs below this are dropped before ranking
  min_jd_words: 60               # word gate  -- JDs below this are dropped before ranking
  max_jd_chars: 8000             # truncation ceiling for JD text stored in raw_jobs
  hours_old: 168                 # Jobs Search API freshness window (hours). 168 = 7 days.
  title_variants_max: 2          # max alternative titles generated by profile_recommender per profile

  # Plug-and-play source registry.
  # Each key must match SOURCE_SPEC["name"] in the corresponding source module.
  # To add a new source: create agents/job_search/sources/<name>.py, add it to
  # agents/job_search/registry.py SOURCES list, then enable it here.
  # API keys are configured via environment variables (see each source's SOURCE_SPEC["env_key"]).
  sources:
    jsearch:
      enabled: true
      pages: 2                   # JSearch  → 10 jobs/page = 20 jobs, 100 sessions/month
    active_jobs_db:
      enabled: true
      pages: 1                   # Active Jobs DB → 10 jobs/page = 10 jobs, 25 sessions/month
    linkedin_jobs:
      enabled: true
      pages: 1                   # LinkedIn Jobs → 10 jobs/page = 10 jobs, 25 sessions/month
    jobs_search_api:
      enabled: true
      pages: 2                   # Jobs Search API → 10 jobs/request = 20 jobs, 50 sessions/month
    techmap:
      enabled: false
      pages: 0                   # Techmap — disabled; enable when TECHMAP_API_KEY is set
    remoteok:
      enabled: false
      pages: 0                   # RemoteOK — disabled; low signal for India-based search


# -- HyDE Prefilter (Agent 5b) -------------------------------------------------
# Generates dual hypothetical JDs (domain-anchored + transferable), embeds all
# job JDs via Voyage AI, and partitions jobs into Section 1 / Section 2 / Dropped.
# Runs between url_pruner and rank_results in the LangGraph pipeline.
hyde_prefilter:
  jd_gen_model:     claude-sonnet-4-6          # Sonnet for both JD1 and JD2 generation
  max_tokens:       1024
  temperature:      0.3
  timeout_secs:     60
  voyage_model:     voyage-3                   # ONLY allowed embedding model (resume-agnostic constraint)
  voyage_batch_size: 128                       # Voyage paid-tier: 8M TPM — all texts in one batch
  # Delta-based partition thresholds:
  #   max(jd1_emb, jd2_emb) >= hyde_min_floor → survives (either S1 or S2)
  #   jd1_emb >= jd2_emb                       → Section 1 ("Roles in your domain")
  #   jd2_emb >  jd1_emb                       → Section 2 ("Broader opportunities")
  #   max < floor                              → Dropped
  hyde_min_floor:   0.45                       # absolute noise floor — drops both-JD-irrelevant jobs
  fallback_floor:   0.40                       # retry floor if Section 1 is empty after first pass
  # Per-section caps applied AFTER floor filtering, sorted by RRF score.
  # Controls maximum jobs entering the ranker agent per section.
  # Total ranker workload = s1_max_jobs + s2_max_jobs (default: 60 jobs max).
  s1_max_jobs: 40                              # max Section 1 jobs entering ranker
  s2_max_jobs: 20                              # max Section 2 jobs entering ranker

# -- Ranker (Agent 6) ----------------------------------------------------------
ranker:
  model:        claude-haiku-4-5-20251001
  max_tokens:   4096
  temperature:  0.1
  timeout_secs: 30
  semaphore_size: 4      # max concurrent LLM calls (shared across all sessions)
  batch_size: 4          # jobs per asyncio.gather() call inside rank_jobs_async()
  batch_delay_secs: 2    # sleep between batches to stay within Tier 1 RPM limit (2s safe at 60 jobs)
  recency_decay_days: 45 # kept for recency_score field; weight is 0.00

  profile_caps:
    rank_1: 30
    rank_2: 20
    rank_3: 10

  # Minimum experience score (0.0–1.0) assigned by the ranker LLM.
  # Jobs scoring below the applicable threshold are dropped from ranked_jobs output.
  # The LLM scores experience on how well candidate years meets JD requirement:
  #   1.0 = meets/exceeds | 0.8 = slight gap | 0.4 = large gap | 0.2 = severe gap
  # Set to 0.0 to disable the filter entirely.
  #
  # Two thresholds — selected per session based on seniority_preference:
  #   same_level  → min_experience_score_same   (stricter: candidate should be competitive)
  #   step_up     → min_experience_score_step_up (lenient: experience gap is expected)
  #
  # Tuning guide:
  #   0.3 → lenient  (keep most roles, drop only extreme mismatches like 15yr Director)
  #   0.4 → default  (drop 5yr+ over-reaches, keep near-miss roles like 2yr gap)
  #   0.5 → strict   (drop anything with a meaningful experience gap)
  min_experience_score_same:    0.5
  min_experience_score_step_up: 0.3

  # Minimum title relevance score (0.0–1.0) assigned by the ranker LLM.
  # Applied to S1 (domain-anchored) jobs only -- S2 (transferable-skill) jobs are
  # fully exempt because adjacent titles are expected and intentional in S2.
  # Set to 0.0 to disable the filter entirely.
  # Tuning guide:
  #   0.2 → very lenient  (keep almost anything, drop only completely unrelated)
  #   0.3 → lenient       (keep "Data Scientist" for "ML Engineer"; good default)
  #   0.4 → moderate      (drop same-broad-family but different roles in S1)
  #   0.5 → strict        (drop "Data Scientist" when searched "ML Engineer")
  #   0.7 → very strict   (keep only near-exact or equivalent title matches)
  min_title_relevance: 0.40

  # ── Minimum fit_score gate ────────────────────────────────────────────────
  # Jobs scoring below this threshold are dropped from ranked_jobs output.
  # Set to 0.0 to disable.
  min_fit_score: 0.45

  # ── Skill overlap pre-filter ─────────────────────────────────────────────
  # Retired: HyDE prefilter (Agent 5b) supersedes keyword overlap as the primary
  # semantic gate. Set to 0.0 to disable entirely — jobs are now filtered upstream.
  min_skill_overlap_ratio: 0.0

  # ── Ranker weights ────────────────────────────────────────────────────────
  # Each weight set MUST sum to 1.0 — config_loader.py validates this on load
  # and refuses to start the app on mismatch. recency is kept in the schema
  # for UI display but always weighted 0.00 in the actual fit_score formula.

  # Weights WITH explicit education requirement in JD
  # fit_score = 0.40*experience + 0.30*skill + 0.20*domain + 0.10*education
  weights_with_education:
    experience: 0.40
    skill:      0.30
    domain:     0.20
    recency:    0.00   # displayed in UI, not used in scoring
    education:  0.10

  # Weights WITHOUT explicit education requirement in JD
  # fit_score = 0.50*experience + 0.30*skill + 0.20*domain
  weights_without_education:
    experience: 0.50
    skill:      0.30
    domain:     0.20
    recency:    0.00   # displayed in UI, not used in scoring

# -- Title Canonical Map -------------------------------------------------------
# Maps alias title strings -> canonical search title.
# Used in TWO places:
#   1. Profile Recommender (Agent 2b): deduplicates suggested profiles whose
#      titles resolve to the same canonical (keeps higher-confidence one).
#   2. Job Search (Agent 3): normalises the search query before hitting APIs,
#      so variant titles resolve to the preferred search form (more results).
#
# Empty by default -- domain-agnostic, operator-populated.
# Add entries for your candidate's field as needed. Example entry:
#   "Alias Title": "Canonical Search Title"
# Case-sensitive. Titles not in the map pass through unchanged.
title_canonical_map: {}
